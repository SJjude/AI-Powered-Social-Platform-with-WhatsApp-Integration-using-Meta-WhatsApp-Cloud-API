services:
  mongo:
    image: mongo:7
    container_name: socialconnect-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: socialconnect
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: socialconnect-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/socialconnect
      JWT_ACCESS_SECRET: replace-with-at-least-32-character-access-secret
      JWT_REFRESH_SECRET: replace-with-at-least-32-character-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_COOKIE_NAME: socialconnect_access_token
      JWT_COOKIE_SECURE: "false"
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      LOG_LEVEL: info
    ports:
      - '${BACKEND_PORT:-5000}:5000'
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
    container_name: socialconnect-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-5173}:80'
    depends_on:
      - backend

volumes:
  mongo_data:
